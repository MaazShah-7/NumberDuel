name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      # Limits Gradle's daemon memory pool
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m"
  # Prevents Node/Metro bundler from memory-hogging
  NODE_OPTIONS: "--max-old-space-size=2048"
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project (Eject to bare React Native)
        run: npx expo prebuild --platform android --no-install

      - name: Build APK
        working-directory: ./frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: number-duel-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
    
